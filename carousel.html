<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel de Photos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .carousel {
      position: relative;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      overflow: hidden;
    }
    .carousel-inner {
      display: flex;
      transition: transform 0.5s ease;
    }
    .carousel-item {
      min-width: 100%;
      aspect-ratio: 16 / 9; /* Ratio standard pour desktop */
      position: relative;
    }
    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Remplit l'espace en coupant si nécessaire */
    }
    .carousel-caption {
      position: absolute;
      bottom: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.6);
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 0.9rem;
      display: none; /* Activer ci-dessous si tu veux des légendes */
    }
    /* Couleur spécifique pour la légende de Valencia */
    .carousel-item:nth-child(2) .carousel-caption {
      color: #ff5733; /* Orange vif, ajustable selon tes préférences */
    }
    .carousel-prev, .carousel-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      padding: 15px;
      cursor: pointer;
      z-index: 10;
      font-size: 1.2rem;
    }
    .carousel-prev {
      left: 10px;
    }
    .carousel-next {
      right: 10px;
    }
    .carousel-dots {
      text-align: center;
      padding: 10px;
    }
    .dot {
      height: 12px;
      width: 12px;
      margin: 0 6px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.6s ease;
      cursor: pointer;
    }
    .active-dot {
      background-color: #717171;
    }
    /* Ajustements pour smartphone */
    @media (max-width: 640px) {
      .carousel {
        margin: 0;
        max-width: 100%;
        height: 90vh; /* Réduit à 90% pour voir le texte */
      }
      .carousel-item {
        height: 90vh !important; /* Force la hauteur ajustée */
        aspect-ratio: unset; /* S'adapte à la hauteur */
      }
      .carousel-item img {
        height: 90vh;
        object-fit: contain; /* Affiche toute l'image */
      }
      .carousel-prev, .carousel-next {
        padding: 10px;
        font-size: 1rem;
      }
      body {
        padding: 0;
        margin: 0;
      }
    }
  </style>
</head>
<body class="bg-gray-100 py-10">

      <div class="carousel-item"><img src="images/carousel/car-bilbao.jpg" alt="Bilbao"><div class="carousel-caption">Bilbao</div></div>

    </div>
    <button class="carousel-prev">&lt;</button>
    <button class="carousel-next">&gt;</button>
    <div class="carousel-dots"></div>
  </div>

  <script>
    let currentIndex = 0;
    const carouselInner = document.querySelector('.carousel-inner');
    const carouselItems = document.querySelectorAll('.carousel-item');
    const dotsContainer = document.querySelector('.carousel-dots');
    const totalSlides = carouselItems.length;

    console.log('Nombre de slides chargées :', totalSlides);

    // Créer les points (dots)
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement('span');
      dot.classList.add('dot');
      dot.addEventListener('click', () => showSlide(i));
      dotsContainer.appendChild(dot);
    }

    const dots = document.querySelectorAll('.dot');

    function showSlide(index) {
      if (index >= totalSlides) index = 0;
      if (index < 0) index = totalSlides - 1;
      currentIndex = index;
      carouselInner.style.transform = `translateX(-${currentIndex * 100}%)`;
      dots.forEach((dot, i) => dot.classList.toggle('active-dot', i === currentIndex));
      // Afficher/masquer les légendes (décommente si tu veux)
      // carouselItems.forEach((item, i) => item.querySelector('.carousel-caption').style.display = i === currentIndex ? 'block' : 'none');
    }

    document.querySelector('.carousel-prev').addEventListener('click', () => showSlide(currentIndex - 1));
    document.querySelector('.carousel-next').addEventListener('click', () => showSlide(currentIndex + 1));

    // Auto-défilement toutes les 5 secondes
    setInterval(() => showSlide(currentIndex + 1), 5000);

    showSlide(currentIndex);
  </script>
</body>
